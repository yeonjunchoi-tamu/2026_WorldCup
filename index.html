<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>2026 북중미 월드컵 — 라이브 센터</title>
  <link rel="icon" type="image/png" href="assets/wc26-logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data-core.js"></script>
  <script src="data-matches.js"></script>

  <!-- JSX bootstrap loader: fetch-with-retry + Babel.transform, injected as classic scripts in order.
       Replaces <script type="text/babel" src> whose synchronous XHR intermittently lost the race
       against the serve layer's cold cache. Preserves load order & shared global lexical scope. -->
  <script>
    (function () {
      var files = ["lib.jsx", "groups.jsx", "bracket.jsx", "detail.jsx", "dashboard.jsx", "leaders.jsx", "app.jsx"];
      function fetchRetry(f, n) {
        return fetch(f, { cache: "reload" }).then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        }).then(function (code) {
          // Guard against proxy/error-page bodies served with a 200 ("upstream connect error", HTML, etc.)
          if (/^\s*upstream connect error|^\s*<(?:!doctype|html)/i.test(code) || code.length < 16) {
            throw new Error("bad body for " + f);
          }
          return code;
        }).catch(function (e) {
          if (n <= 0) throw e;
          return new Promise(function (res) { setTimeout(res, 250); }).then(function () { return fetchRetry(f, n - 1); });
        });
      }
      function boot() {
        var p = Promise.resolve();
        files.forEach(function (f) {
          p = p.then(function () {
            return fetchRetry(f, 12).then(function (code) {
              var out = Babel.transform(code, { presets: ["react"], filename: f }).code;
              var s = document.createElement("script");
              s.textContent = out;
              document.body.appendChild(s);
            });
          });
        });
        return p.catch(function (e) { console.error("JSX bootstrap failed:", e); });
      }
      if (window.Babel) boot();
      else window.addEventListener("load", boot);
    })();
  </script>
</body>
</html>
